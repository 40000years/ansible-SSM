[defaults]
# Search for roles both in project root and playbooks dir
roles_path = roles:playbooks/roles
host_key_checking = False
deprecation_warnings = False
# Use built-in default callback with yaml formatting (ansible-core 2.13+)
stdout_callback = ansible.builtin.default
result_format = yaml
callbacks_enabled = timer, profile_tasks

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPersist=60s
pipelining = True

[inventory]
enable_plugins = amazon.aws.aws_ec2, host_list, ini, yaml
