ubtu26stig_100410: true    # Account lockout duration
ubtu26stig_100500: true    # Password history
ubtu26stig_100510: true    # Password special characters
ubtu26stig_100600: true    # Minimum password different chars
ubtu26stig_100650: true    # No shared accounts
ubtu26stig_100660: true    # Unique UIDs
ubtu26stig_100820: true    # sudo-rs installed and active
ubtu26stig_100830: true    # No NOPASSWD in sudoers
ubtu26stig_100840: true    # sudo logging enabled
ubtu26stig_100850: true    # sudo env_reset
ubtu26stig_100860: true    # sudo use_pty
