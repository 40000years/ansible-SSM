- name: "UBTU-26-400375 | CAT II | PATCH | Set home directory permissions to 750 or less"
  ansible.builtin.shell: |
    awk -F: '($3 >= 1000 && $7 != "/sbin/nologin" && $7 != "/bin/false") {print $6}' /etc/passwd |
    while read homedir; do
      if [ -d "$homedir" ]; then
        perms=$(stat -c '%a' "$homedir")
        if [ "${perms}" -gt 750 ]; then
          chmod 750 "$homedir"
        fi
      fi
    done
  changed_when: true
  when: ubtu26stig_400375 | bool
  tags:
    - UBTU-26-400375
    - CAT2
    - patch
    - permissions

- name: "UBTU-26-400110 | CAT II | AUDIT | Warn on World-Writable files"
  ansible.builtin.debug:
    msg: "WARNING: World-writable files exist. Review manually via find / -xdev -type f -perm -0002"
  when: ubtu26stig_400110 | bool
  tags:
    - UBTU-26-400110
    - CAT2
    - audit

- name: "UBTU-26-400220 | CAT II | AUDIT | Warn on Unowned files"
  ansible.builtin.debug:
