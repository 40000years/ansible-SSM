- name: "UBTU-26-400260 | CAT II | PATCH | Ensure sticky bit set on world-writable directories"
  ansible.builtin.shell: |
    df --local -P | awk 'NR!=1 {print $6}' | xargs -I '{}' find '{}' -xdev -type d -perm -0002 -not -perm -1000 -print 2>/dev/null | xargs -I '{}' chmod o+t '{}' || true
  changed_when: true
  when: ubtu26stig_400260 | bool
  tags:
    - UBTU-26-400260
    - CAT2
    - patch
    - permissions

