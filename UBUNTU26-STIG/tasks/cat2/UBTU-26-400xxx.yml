---
# UBUNTU26-STIG tasks/cat2/UBTU-26-400xxx.yml
# CAT II — File Permissions and Ownership

- name: "UBTU-26-400000 | CAT II | PATCH | Set /etc/passwd permissions"
  ansible.builtin.file:
    path: /etc/passwd
    owner: root
    group: root
    mode: '0644'
  when: ubtu26stig_400000 | bool
  tags:
    - UBTU-26-400000
    - CAT2
    - patch
    - permissions

