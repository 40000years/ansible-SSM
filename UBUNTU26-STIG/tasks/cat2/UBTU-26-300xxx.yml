---
# UBUNTU26-STIG tasks/cat2/UBTU-26-300xxx.yml
# CAT II — SSH Configuration Controls

- name: "UBTU-26-300006 | CAT II | PATCH | SSH must use Protocol 2"
  ansible.builtin.lineinfile:
    path: "{{ ubtu26stig_ssh_config_file }}"
    regexp: '^#?Protocol'
    line: 'Protocol 2'
    state: present
    validate: 'sshd -t -f %s'
  when: ubtu26stig_300006 | bool
  notify: restart sshd
  tags:
    - UBTU-26-300006
    - CAT2
    - patch
    - ssh

