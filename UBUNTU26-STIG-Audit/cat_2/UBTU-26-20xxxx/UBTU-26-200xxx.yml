    exec: "auditctl -l 2>/dev/null | grep -E 'chmod|chown|fchmod|fchown|lchown' || grep -rE 'chmod|chown' /etc/audit/rules.d/ 2>/dev/null || echo 'NOT_CONFIGURED'"
    exit-status: 0
