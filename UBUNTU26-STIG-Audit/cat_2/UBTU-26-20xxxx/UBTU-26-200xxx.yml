    exec: "auditctl -l 2>/dev/null | grep -E 'init_module|finit_module|delete_module|insmod|rmmod|modprobe' || grep -rE 'init_module|finit_module' /etc/audit/rules.d/ 2>/dev/null || echo 'NOT_CONFIGURED'"
