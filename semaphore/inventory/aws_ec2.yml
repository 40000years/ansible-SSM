# semaphore/inventory/aws_ec2.yml
# Dynamic Inventory สำหรับ AWS EC2 ใช้งานผ่าน Semaphore
# เชื่อมต่อผ่าน AWS SSM Session Manager โดยตรง — ไม่ต้องใช้ SSH key เลย!
# ต้องการแค่ IAM Role ที่มี ssm:StartSession permission

plugin: amazon.aws.aws_ec2
regions:
  - ap-southeast-1
filters:
  instance-state-name: running
keyed_groups:
  - prefix: tag_Name
    key: tags.Name
  - prefix: tag_Environment
    key: tags.Environment
hostnames:
  - instance-id

compose:
  # ใช้ SSM connection โดยตรง — ไม่ต้อง SSH key ไม่ต้อง port 22
  ansible_connection: "'amazon.aws.aws_ssm'"
  ansible_aws_ssm_region: "'ap-southeast-1'"
  ansible_aws_ssm_bucket_name: "'thanaphat-web-app-bucket-2026-858039354188-ap-southeast-1-an'"
  ansible_user: "'ubuntu'"
  ansible_python_interpreter: "'/usr/bin/python3'"
  ansible_become_exe: "'sudo'"