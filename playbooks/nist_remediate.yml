---
# playbooks/nist_remediate.yml
# NIST SP 800-53 Automated Remediation Playbook
# Mode: ENFORCES configuration (MAKES CHANGES to target hosts)
#
# WARNING: Run nist_check.yml first to see current state before remediating.
#
# Usage:
#   ansible-playbook playbooks/nist_remediate.yml -i inventory.aws_ec2.yml
#   ansible-playbook playbooks/nist_remediate.yml -i inventory.aws_ec2.yml --check   # dry-run
#   ansible-playbook playbooks/nist_remediate.yml -i inventory.aws_ec2.yml --tags ac,ia

- name: "NIST SP 800-53 Compliance Remediation"
  hosts: all
  become: true
  gather_facts: true

  handlers:
    - name: restart sshd
      ansible.builtin.service:
        name: "{{ 'sshd' if ansible_os_family in ['RedHat', 'Amazon'] else 'ssh' }}"
        state: restarted

    - name: restart auditd
      ansible.builtin.service:
        name: auditd
        state: restarted

  tasks:

    # ─── AC / IA: SSH Hardening ──────────────────────────────────────────────
    - name: "[AC-17 / SC-8] Harden SSH configuration"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        backup: true
      loop:
        - { regexp: '^#?PermitRootLogin',       line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?X11Forwarding',          line: 'X11Forwarding no' }
        - { regexp: '^#?MaxAuthTries',           line: 'MaxAuthTries 4' }
        - { regexp: '^#?ClientAliveInterval',    line: 'ClientAliveInterval 300' }
        - { regexp: '^#?ClientAliveCountMax',    line: 'ClientAliveCountMax 0' }
        - { regexp: '^#?PermitEmptyPasswords',   line: 'PermitEmptyPasswords no' }
        - { regexp: '^#?Protocol',               line: 'Protocol 2' }
        - { regexp: '^#?LogLevel',               line: 'LogLevel VERBOSE' }
        - { regexp: '^#?StrictModes',            line: 'StrictModes yes' }
      notify: restart sshd
      tags: [ac, sc, ssh]

    # ─── IA-5: Password Policy ───────────────────────────────────────────────
    - name: "[IA-5] Install libpwquality (password complexity)"
      ansible.builtin.package:
        name: "{{ 'libpam-pwquality' if ansible_os_family == 'Debian' else 'libpwquality' }}"
        state: present
      tags: [ia, password]

    - name: "[IA-5] Configure password complexity (pwquality.conf)"
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: "^#?{{ item.key }}"
        line: "{{ item.key }} = {{ item.value }}"
        create: true
        mode: '0644'
      loop:
        - { key: minlen,   value: "14" }
        - { key: dcredit,  value: "-1" }
        - { key: ucredit,  value: "-1" }
        - { key: lcredit,  value: "-1" }
        - { key: ocredit,  value: "-1" }
        - { key: minclass, value: "4"  }
        - { key: maxrepeat, value: "3" }
      tags: [ia, password]

    - name: "[IA-5] Configure password aging (login.defs)"
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: "^#?{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: 'PASS_MAX_DAYS', line: 'PASS_MAX_DAYS 90' }
        - { regexp: 'PASS_MIN_DAYS', line: 'PASS_MIN_DAYS 7' }
        - { regexp: 'PASS_WARN_AGE', line: 'PASS_WARN_AGE 14' }
      tags: [ia, password]

    # ─── AC-7: Account Lockout ───────────────────────────────────────────────
    - name: "[AC-7] Configure account lockout (faillock.conf)"
      ansible.builtin.lineinfile:
        path: /etc/security/faillock.conf
        regexp: "^#?{{ item.key }}"
        line: "{{ item.key }} = {{ item.value }}"
        create: true
        mode: '0644'
      loop:
        - { key: deny,        value: "5"   }
        - { key: unlock_time, value: "900" }
        - { key: fail_interval, value: "900" }
        - { key: audit,       value: ""    }
      tags: [ac, lockout]

    # ─── AU: Audit Logging ───────────────────────────────────────────────────
    - name: "[AU-2] Install auditd"
      ansible.builtin.package:
        name: "{{ 'auditd' if ansible_os_family == 'Debian' else 'audit' }}"
        state: present
      tags: [au, audit]

    - name: "[AU-2] Enable and start auditd"
      ansible.builtin.service:
        name: auditd
        state: started
        enabled: true
      tags: [au, audit]

    - name: "[AU-12] Deploy NIST audit rules"
      ansible.builtin.copy:
        dest: /etc/audit/rules.d/nist_compliance.rules
        mode: '0640'
        backup: true
        content: |
          ## NIST SP 800-53 AU-12 Audit Rules
          ## Generated by Ansible NIST Compliance Role

          # Delete all existing rules first
          -D

          # Set buffer size
          -b 8192

          # Failure mode: 1=printk, 2=panic
          -f 1

          # === AU-12: Authentication events ===
          -w /var/log/faillog -p wa -k logins
          -w /var/log/lastlog -p wa -k logins
          -w /var/log/tallylog -p wa -k logins

          # === AU-12: Identity / account changes ===
          -w /etc/passwd -p wa -k identity
          -w /etc/group -p wa -k identity
          -w /etc/shadow -p wa -k identity
          -w /etc/gshadow -p wa -k identity
          -w /etc/security/opasswd -p wa -k identity

          # === AU-12: Privilege escalation (sudo) ===
          -w /etc/sudoers -p wa -k actions
          -w /etc/sudoers.d/ -p wa -k actions
          -w /var/log/sudo.log -p wa -k actions

          # === AU-12: SSH configuration changes ===
          -w /etc/ssh/sshd_config -p wa -k sshd

          # === AU-12: Cron jobs ===
          -w /etc/cron.allow -p wa -k cron
          -w /etc/cron.deny -p wa -k cron
          -w /etc/crontab -p wa -k cron
          -w /etc/cron.d/ -p wa -k cron

          # === SI-7: System file integrity ===
          -w /sbin/insmod -p x -k modules
          -w /sbin/rmmod -p x -k modules
          -w /sbin/modprobe -p x -k modules
          -a always,exit -F arch=b64 -S init_module -S delete_module -k modules
      notify: restart auditd
      tags: [au, audit]

    - name: "[AU-9] Set audit log directory permissions"
      ansible.builtin.file:
        path: /var/log/audit
        state: directory
        mode: '0750'
        owner: root
        group: root
      tags: [au, audit]

    # ─── SC-5: Network Kernel Hardening ─────────────────────────────────────
    - name: "[SC-5] Apply network security sysctl settings"
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        sysctl_file: /etc/sysctl.d/99-nist-hardening.conf
      loop:
        # DoS protection
        - { key: net.ipv4.tcp_syncookies,                   value: "1" }
        # Disable IP source routing
        - { key: net.ipv4.conf.all.accept_source_route,     value: "0" }
        - { key: net.ipv4.conf.default.accept_source_route, value: "0" }
        # Disable ICMP redirects
        - { key: net.ipv4.conf.all.accept_redirects,        value: "0" }
        - { key: net.ipv4.conf.default.accept_redirects,    value: "0" }
        - { key: net.ipv4.conf.all.send_redirects,          value: "0" }
        - { key: net.ipv4.conf.default.send_redirects,      value: "0" }
        # Disable IP forwarding (non-router)
        - { key: net.ipv4.ip_forward,                       value: "0" }
        # Log suspicious packets
        - { key: net.ipv4.conf.all.log_martians,            value: "1" }
        # Ignore broadcast ICMP (Smurf attack)
        - { key: net.ipv4.icmp_echo_ignore_broadcasts,      value: "1" }
        # Ignore bogus ICMP error responses
        - { key: net.ipv4.icmp_ignore_bogus_error_responses, value: "1" }
        # Randomize virtual address space (ASLR)
        - { key: kernel.randomize_va_space,                 value: "2" }
      tags: [sc, sysctl]

    # ─── SI-7: Critical File Permissions ────────────────────────────────────
    - name: "[SI-7] Set critical file permissions"
      ansible.builtin.file:
        path: "{{ item.path }}"
        mode: "{{ item.mode }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
      loop:
        - { path: /etc/passwd,   mode: '0644', owner: root, group: root }
        - { path: /etc/shadow,   mode: '0640', owner: root, group: shadow }
        - { path: /etc/group,    mode: '0644', owner: root, group: root }
        - { path: /etc/gshadow,  mode: '0640', owner: root, group: shadow }
        - { path: /etc/sudoers,  mode: '0440', owner: root, group: root }
      failed_when: false
      tags: [si, permissions]

    # ─── CM-6: /tmp hardening ────────────────────────────────────────────────
    - name: "[CM-6] Set secure umask in login.defs"
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: '^#?UMASK'
        line: 'UMASK 027'
      tags: [cm, umask]
