name: NIST SP 800-53 Compliance Validation
on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  push:
    paths:
      - 'roles/nist_compliance/**'
      - 'playbooks/nist_check.yml'
  pull_request:
    paths:
      - 'roles/nist_compliance/**'
      - 'playbooks/nist_check.yml'

jobs:
  lint:
    name: Lint Ansible Playbooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Lint compliance role
        run: ansible-lint roles/nist_compliance/ playbooks/nist_check.yml

  validate-dry-run:
    name: Validate Compliance (Check Mode)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible boto3 botocore

      - name: Install AWS EC2 collection
        run: ansible-galaxy collection install amazon.aws ansible.posix

      - name: Run compliance validation (check mode)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1
        run: |
          ansible-playbook playbooks/nist_check.yml \
            -i inventory.aws_ec2.yml \
            --check \
            -e "nist_fail_on_low_score=true nist_min_score=70"

      - name: Upload compliance reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nist-compliance-reports
          path: reports/
          retention-days: 90
