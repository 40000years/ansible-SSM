plugin: amazon.aws.aws_ec2
regions:
  - ap-southeast-1
filters:
  instance-state-name: running
keyed_groups:
  - prefix: tag_Name
    key: tags.Name
hostnames:
  - instance-id

compose:
  ansible_connection: "'ssh'"
  ansible_user: "'ubuntu'"
  ansible_ssh_private_key_file: "'~/.ssh/aws-web-server'"
  ansible_ssh_common_args: "'-o StrictHostKeyChecking=no'"
